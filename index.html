<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Designer's EXP"/>
<meta name="theme-color" content="#1a1a0a"/>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<title>Designer's EXP</title>
</head>
<body>
<div id="loadScreen"><span style="font-family:'Cinzel',serif;">LOADING...</span></div>
<div class="bg"></div>
<div class="rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div>
<div class="trunk"></div>
<div class="mushrooms">
  <svg width="120" height="150" viewBox="0 0 130 160" fill="none">
    <ellipse cx="55" cy="100" rx="18" ry="28" fill="#d4c8a0" stroke="#a09060" stroke-width="1.5"/>
    <ellipse cx="55" cy="100" rx="10" ry="26" fill="#e0d8b0"/>
    <path d="M10 105 Q20 55 55 50 Q90 55 100 105 Q78 118 55 115 Q32 118 10 105Z" fill="#d44010"/>
    <path d="M10 105 Q20 55 55 50 Q90 55 100 105 Q78 118 55 115 Q32 118 10 105Z" fill="none" stroke="#a03008" stroke-width="1.5"/>
    <ellipse cx="30" cy="80" rx="8" ry="5" fill="rgba(255,255,255,0.25)" transform="rotate(-20 30 80)"/>
    <ellipse cx="72" cy="68" rx="6" ry="4" fill="rgba(255,255,255,0.2)" transform="rotate(10 72 68)"/>
    <ellipse cx="90" cy="128" rx="10" ry="18" fill="#d4c8a0" stroke="#a09060" stroke-width="1"/>
    <path d="M68 130 Q75 100 90 96 Q105 100 112 130 Q102 138 90 136 Q78 138 68 130Z" fill="#e8b820"/>
    <path d="M68 130 Q75 100 90 96 Q105 100 112 130 Q102 138 90 136 Q78 138 68 130Z" fill="none" stroke="#c09010" stroke-width="1.2"/>
    <ellipse cx="22" cy="145" rx="7" ry="12" fill="#c8c0a0" stroke="#a09880" stroke-width="1"/>
    <path d="M8 147 Q12 128 22 125 Q32 128 36 147 Q30 152 22 151 Q14 152 8 147Z" fill="#b0a890"/>
  </svg>
</div>
<div class="bottom-triangle">
  <svg viewBox="0 0 100 55" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,55 100,0 100,55" fill="#dcbe6e"/>
  </svg>
</div>
<div class="img-overlay" id="imgOverlay"><img class="img-overlay-img" id="imgOverlayImg" src="" alt=""/></div>
<div class="del-overlay" id="delOverlay">
  <div class="del-box">
    <div class="del-title" id="delTitle">Delete</div>
    <div class="del-msg" id="delMsg"></div>
    <div class="del-btns">
      <button class="btn sm" id="btnDelCancel">Cancel</button>
      <button class="btn sm danger" id="btnDelConfirm">Delete</button>
    </div>
  </div>
</div>
<div class="mech-detail-overlay" id="mechDetailOverlay">
  <div class="mech-detail-box">
    <div class="mech-detail-hdr">
      <div class="mech-detail-name" id="mechDetailTitle"></div>
      <button class="heart" id="mechDetailHeart">&#9825;</button>
    </div>

    <label class="inp-label" style="flex-shrink:0;">Comments</label>
    <textarea class="wood-textarea" id="mechDetailComments" placeholder="Add notes..."></textarea>
    <div class="mech-detail-btns">
      <button class="btn sm" id="btnMechDetailCancel">Cancel</button>
      <button class="btn sm" id="btnMechDetailSave">Save</button>
    </div>
  </div>
</div>
<div class="level-panel-overlay" id="levelPanelOverlay"></div>
<div class="level-panel" id="levelPanel">
  <div class="level-panel-title">Level Table</div>
  <table class="level-table">
    <thead><tr><th>LV</th><th>EXP Needed</th><th>Total</th></tr></thead>
    <tbody id="levelTableBody"></tbody>
  </table>
  <div class="level-close-btn"><button class="btn sm" id="btnLevelClose">Close</button></div>
</div>
<div class="app" id="app" style="visibility:hidden">
  <div class="inner" id="mainInner">
    <div class="exp-box" id="expBox">
      <button class="exp-dl-btn" id="btnDownload" title="Download data">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="12" y1="2" x2="12" y2="15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M4 18 Q4 21 7 21 L17 21 Q20 21 20 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
      <button class="exp-info-btn" id="btnExpInfo">i</button>
      <div class="app-title">Designer's EXP</div>
      <div class="exp-label-row">
        <span class="exp-label" id="expLabel"><span class="ew">EXP.</span> 0/0 [0.00%]</span>
        <span class="exp-level" id="expLevelLabel">LV. 1</span>
      </div>
      <div class="exp-bar-wrap" id="expWrap">
        <div class="exp-bar-inner">
          <div class="exp-fill" id="expFill" style="width:0%"></div>
          <div class="exp-empty"></div>
        </div>
        <canvas class="exp-ticks" id="expCanvas"></canvas>
      </div>
    </div>
    <div class="panel games-panel" id="gamesPanel">
      <div class="panel-hdr">
        <span class="panel-title">Games Played</span>
        <div class="hdr-btns" id="gamesHdrBtns"></div>
      </div>
      <div class="panel-body">
        <div id="gamesFilterRow"></div>
        <div class="games-list-scroll" id="gamesList"></div>
      </div>
    </div>
    <div class="panel mech-panel" id="mechPanel">
      <div class="panel-hdr">
        <span class="panel-title">Mechanics <span class="mech-count" id="mechCount"></span></span>
        <div class="hdr-btns" id="mechHdrBtns"></div>
      </div>
      <div class="panel-body">
        <div class="search-wrap">
          <input class="search-inp" id="mechSearch" placeholder="Search mechanics..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
          <button class="search-clear" id="mechSearchClear">✕</button>
        </div>
        <div class="filter-row" id="mechFilterRow"></div>
        <div class="mech-scroll" id="mechList"></div>
      </div>
    </div>
  </div>
</div>
<div class="sp" id="spDetail" style="z-index:200;">
  <div class="sp-inner" id="spDetailInner">
    <div class="sp-handle"></div>
    <div class="detail-hdr">
      <div class="detail-title" id="detailName"></div>
      <button class="heart" id="detailHeart">&#9825;</button>
    </div>
    <div class="detail-scroll">
      <div id="detailThumbWrap"></div>
      <div class="detail-sec">Date Played</div>
      <div class="detail-val" id="detailDate"></div>
      <div class="detail-sec" id="detailInfoSec" style="display:none">BGG Info</div>
      <div id="detailInfo"></div>
      <div class="detail-sec">Mechanics</div>
      <div id="detailMechs"></div>
      <div class="detail-sec" id="detailCommentsSec" style="display:none">Comments</div>
      <div id="detailComments"></div>
    </div>
    <div class="btn-row-l"><button class="btn" id="btnDetailBack">Back</button></div>
  </div>
</div>
<div class="sp" id="spAddGame" style="z-index:201;">
  <div class="sp-inner" id="spAddGameInner">
    <div class="sp-handle"></div>
    <div class="sp-title" id="addGameTitle">Add Game</div>
    <div class="sp-scroll-body">
      <label class="inp-label">Game Name</label>
      <div class="bgg-name-wrap">
        <div class="bgg-input-row">
          <input class="wood-inp" id="newGameName" type="text" placeholder="Enter game name" autocomplete="off"/>
          <button class="bgg-input-clear" id="newGameNameClear">✕</button>
        </div>
        <div class="bgg-dropdown" id="bggDropdown"></div>
      </div>
      <div class="err-msg" id="addGameNameErr">Please enter a game name</div>
      <label class="inp-label" style="margin-top:8px;">Date Played</label>
      <input class="wood-inp" id="newGameDate" type="date"/>
      <label class="inp-label" style="margin-top:4px;">Mechanics</label>
      <div class="search-wrap" style="margin-bottom:6px;">
        <input class="wood-inp" id="gamesMechSearch" type="text" placeholder="Search mechanics..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-bottom:0;padding-right:38px;"/>
        <button class="search-clear" id="gamesMechSearchClear">✕</button>
      </div>
      <div class="mech-pick-scroll" id="mechPickList"></div>
      <label class="inp-label" style="margin-top:4px;">Comments</label>
      <textarea class="wood-textarea" id="newGameComments" placeholder="Add notes or comments..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnAddGameCancel">Cancel</button>
      <button class="btn" id="btnAddGameSave">Save</button>
    </div>
  </div>
</div>
<div class="sp" id="spAddMech" style="z-index:199;">
  <div class="sp-inner" id="spAddMechInner">
    <div class="sp-handle"></div>
    <div class="sp-title">Add Mechanic</div>
    <div style="flex-shrink:0;">
      <label class="inp-label">Mechanic Name</label>
      <input class="wood-inp" id="newMechInp" type="text" placeholder="Enter mechanic name" autocomplete="off" style="margin-bottom:4px;"/>
      <div class="err-msg" id="addMechErr">Mechanic Already Exists</div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnAddMechCancel">Cancel</button>
      <button class="btn" id="btnAddMechSave">Save</button>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<script src="app.js" defer></script>

</body>
</html>
