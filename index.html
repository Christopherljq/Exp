<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Designer's EXP"/>
<meta name="theme-color" content="#1a1a0a"/>
<title>Designer's EXP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:wght@400;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --max-w:700px;
  --btn-h:36px;
  --w1:#d49050;--w2:#8b4513;--w3:#5a2e0e;--w4:#2a1005;
  --ws:#1a0803;--wt:#fff5e0;--pc:#c4b090;
  --bg:radial-gradient(ellipse at 25% 60%,rgba(20,80,20,.95) 0%,transparent 45%),
    radial-gradient(ellipse at 10% 80%,rgba(10,50,10,.9) 0%,transparent 35%),
    radial-gradient(ellipse at 65% 15%,rgba(80,160,200,.5) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 10%,rgba(60,120,160,.4) 0%,transparent 40%),
    linear-gradient(160deg,#0a2010 0%,#1a3a20 20%,#2a6030 40%,#4a9060 60%,#6ab080 80%,#8ad0a0 100%);
}
html{height:100%;width:100%;min-height:-webkit-fill-available;background:var(--bg);background-size:cover;background-attachment:fixed;}
body{width:100%;height:100%;min-height:-webkit-fill-available;overflow:hidden;font-family:'Crimson Text',Georgia,serif;font-size:16px;background:var(--bg);background-size:cover;background-attachment:fixed;touch-action:manipulation;}

#loadScreen{position:fixed;inset:0;z-index:999;background:#1a1a0e;display:flex;align-items:center;justify-content:center;transition:opacity .5s;}
#loadScreen.hide{opacity:0;pointer-events:none;}
#loadScreen span{font-family:'Cinzel',serif;font-size:1.4rem;color:#f0e8d0;letter-spacing:2px;text-shadow:0 0 12px rgba(200,212,32,.4);}

.bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;background:var(--bg);background-size:cover;}

.rays{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.ray{position:absolute;top:-5%;transform-origin:top center;filter:blur(7px);}
.ray:nth-child(1){left:34%;width:75px;height:120%;transform:rotate(-8deg);background:linear-gradient(180deg,transparent,rgba(255,255,200,.17),transparent);}
.ray:nth-child(2){left:50%;width:45px;height:110%;transform:rotate(2deg);background:linear-gradient(180deg,transparent,rgba(200,240,255,.13),transparent);}
.ray:nth-child(3){left:62%;width:95px;height:130%;transform:rotate(10deg);background:linear-gradient(180deg,transparent,rgba(255,240,180,.15),transparent);}
.ray:nth-child(4){left:73%;width:38px;height:100%;transform:rotate(18deg);background:linear-gradient(180deg,transparent,rgba(180,220,255,.11),transparent);}

.trunk{position:fixed;left:-30px;top:0;bottom:0;width:210px;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(175deg,rgba(200,170,80,.85) 0px,rgba(200,170,80,.85) 8px,rgba(220,190,110,.8) 8px,rgba(220,190,110,.8) 18px,rgba(190,160,70,.85) 18px,rgba(190,160,70,.85) 28px,rgba(210,180,95,.82) 28px,rgba(210,180,95,.82) 40px);
  clip-path:polygon(0 0,75% 0,100% 8%,90% 25%,100% 45%,85% 60%,100% 75%,88% 90%,100% 100%,0 100%);
  filter:drop-shadow(6px 0 14px rgba(0,0,0,.3));}
.trunk::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(255,230,140,.3) 0%,transparent 50%),radial-gradient(ellipse at 20% 70%,rgba(180,220,80,.2) 0%,transparent 40%);}

.mushrooms{position:fixed;bottom:calc(var(--safe-b) + 48px);left:18px;z-index:3;pointer-events:none;width:120px;height:150px;}

.app{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;display:flex;flex-direction:column;align-items:center;
  padding:calc(var(--safe-t) + 14px) calc(var(--safe-r) + 14px) calc(var(--safe-b) + 14px) calc(var(--safe-l) + 14px);overflow:hidden;}
.inner{width:100%;max-width:var(--max-w);display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}

/* EXP */
.exp-box{flex-shrink:0;margin-bottom:11px;background:#1a1a0e;border:2px solid #050500;border-radius:8px;padding:10px 13px 12px;box-shadow:inset 0 2px 8px rgba(0,0,0,.8),0 3px 10px rgba(0,0,0,.5);}
.app-title{text-align:center;font-family:'Cinzel',serif;font-size:1.45rem;font-weight:900;letter-spacing:2px;color:#f0e8d0;text-shadow:1px 1px 3px rgba(0,0,0,.8),0 0 14px rgba(200,212,32,.2);margin-bottom:8px;}
.exp-label{display:block;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:.5px;color:#e8e8d0;text-shadow:0 0 6px rgba(200,220,100,.5),1px 1px 0 #000;margin-bottom:7px;}
.exp-label .ew{color:#fff;text-shadow:0 0 8px rgba(255,255,200,.8),1px 1px 0 #000;}
.exp-bar-wrap{position:relative;width:100%;height:0;padding-bottom:4.8%;border-radius:50px;border:2px solid #050500;overflow:hidden;box-shadow:inset 0 3px 8px rgba(0,0,0,.7);}
.exp-bar-inner{position:absolute;inset:0;display:flex;border-radius:50px;overflow:hidden;}
.exp-fill{height:100%;flex-shrink:0;background:linear-gradient(180deg,#f0ff60 0%,#d4e820 35%,#a0b800 65%,#c8d820 100%);box-shadow:inset 0 2px 0 rgba(255,255,180,.6);position:relative;transition:width .6s cubic-bezier(.4,0,.2,1);}
.exp-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,220,.55),transparent);border-radius:50px 50px 0 0;}
.exp-empty{flex:1;height:100%;background:linear-gradient(180deg,#d8d8c8 0%,#b8b8a8 40%,#a0a090 70%,#c0c0b0 100%);position:relative;}
.exp-empty::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.45),transparent);}
.exp-ticks{position:absolute;inset:0;z-index:2;pointer-events:none;width:100%;height:100%;}

/* PANEL */
.panel{position:relative;border-radius:7px;border:3px solid var(--ws);overflow:hidden;flex-shrink:0;margin-bottom:11px;
  background:repeating-linear-gradient(88deg,transparent 0,transparent 20px,rgba(0,0,0,.05) 20px,rgba(0,0,0,.05) 22px),
    linear-gradient(175deg,var(--w1) 0%,var(--w2) 25%,var(--w3) 60%,var(--w4) 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -2px 0 rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.5);}
.panel::before{content:'';position:absolute;inset:2px;border-radius:4px;border-top:1px solid rgba(255,255,255,.15);pointer-events:none;z-index:0;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:2px solid var(--ws);position:relative;z-index:1;}
.panel-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--wt);text-shadow:1px 1px 2px var(--ws);letter-spacing:.5px;}
.panel-body{padding:10px 12px;position:relative;z-index:1;}
.hdr-btns{display:flex;align-items:center;gap:5px;flex-shrink:0;}

/* GAMES PANEL — max 40% of remaining space */
.games-panel{display:flex;flex-direction:column;overflow:hidden;}
.games-panel .panel-body{display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.games-list-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0;}

/* MECH PANEL — fills remaining space */
.panel.mech-panel{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;margin-bottom:0;}
.mech-panel .panel-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.mech-scroll{flex:1;min-height:calc(5*44px);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;height:var(--btn-h);padding:0 13px;
  background:linear-gradient(180deg,var(--w1) 0%,var(--w2) 55%,var(--w4) 100%);
  border:2px solid var(--ws);border-radius:5px;color:var(--wt);font-family:'Cinzel',serif;
  font-size:.8rem;font-weight:700;letter-spacing:.3px;white-space:nowrap;cursor:pointer;
  text-shadow:1px 1px 1px var(--ws);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 2px 5px rgba(0,0,0,.35);
  -webkit-appearance:none;user-select:none;-webkit-user-select:none;}
.btn.sm{font-size:.74rem;padding:0 10px;}
.btn.danger{background:linear-gradient(180deg,#b03828 0%,#6b1f10 100%);border-color:#2a0800;}
.btn.blue{background:linear-gradient(180deg,#4a80d4 0%,#1a4a8b 55%,#0a2850 100%);border-color:#0a1a3a;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn.active-filter{background:linear-gradient(180deg,#e0a050 0%,var(--w2) 100%);box-shadow:0 0 8px rgba(220,140,40,.4);}

/* HEART */
.heart{display:inline-flex;align-items:center;justify-content:center;width:var(--btn-h);height:var(--btn-h);background:none;border:none;cursor:pointer;font-size:1.25rem;color:#aaa;-webkit-appearance:none;user-select:none;-webkit-user-select:none;flex-shrink:0;}
.heart.on{color:#e83030;}

/* FILTER */
.filter-row{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;flex-shrink:0;}

/* SEARCH */
.search-inp{width:100%;font-size:16px;font-family:'Crimson Text',serif;background:rgba(0,0,0,.35);border:2px solid var(--ws);border-radius:4px;color:var(--wt);padding:9px 12px;outline:none;margin-bottom:9px;flex-shrink:0;-webkit-appearance:none;}
.search-inp:focus{border-color:var(--w1);}
.search-inp::placeholder{color:var(--pc);opacity:.6;}

/* GAME ROW */
.game-row{
  display:flex;align-items:center;padding:7px 10px;margin-bottom:5px;border-radius:5px;
  border:1px solid rgba(100,160,220,.3);
  background:linear-gradient(135deg,rgba(80,140,200,0.55),rgba(50,100,170,0.55));
}
.game-info{flex:1;cursor:pointer;user-select:none;-webkit-user-select:none;}
.game-name{font-family:'Cinzel',serif;font-size:1rem;color:#1a1a00;font-weight:700;text-shadow:none;}
.game-date{font-size:.85rem;color:#1a2a10;margin-top:2px;}
.game-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
/* Hearts on game rows — dark so visible on blue */
.game-row .heart{color:#1a1a00;}
.game-row .heart.on{color:#e83030;}

/* MECH ROWS */
.mech-row{display:flex;align-items:center;padding:9px 10px;margin-bottom:4px;border-radius:5px;border:1px solid rgba(255,200,80,.07);min-height:44px;background:rgba(0,0,0,.18);}
.mech-row.ticked{background:linear-gradient(135deg,rgba(200,212,32,0.85),rgba(160,176,0,0.85));border-color:rgba(180,200,0,.5);min-height:0;padding:5px 10px;}
.mech-row-name{font-size:1rem;flex:1;color:var(--wt);}
.mech-row.ticked .mech-row-name{color:#1a1a00;font-weight:700;}
.tick-sym{color:#3a6010;font-size:.95rem;margin-right:6px;flex-shrink:0;font-weight:900;}
/* Heart on ticked mech rows — dark so visible on yellow-green */
.mech-row.ticked .heart{color:#1a1a00;}
.mech-row.ticked .heart.on{color:#e83030;}

.mech-edit-row{display:flex;align-items:center;gap:6px;padding:7px 8px;margin-bottom:4px;border-radius:5px;border:1px solid rgba(255,200,80,.07);min-height:44px;background:rgba(0,0,0,.18);}
.mech-chk{width:22px;height:22px;border-radius:3px;flex-shrink:0;border:2px solid var(--w2);background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;}
.mech-chk.on{background:linear-gradient(135deg,#1a6a10,#2a9a20);border-color:#4ac830;}
.mech-chk.on::after{content:'✓';color:#a0ff80;font-size:13px;}
.mech-edit-name{font-size:1rem;color:var(--wt);flex:1;min-width:0;}
.mech-edit-inp{flex:1;min-width:0;background:rgba(0,0,0,.35);border:2px solid var(--w1);border-radius:3px;color:var(--wt);font-family:'Crimson Text',serif;font-size:16px;padding:5px 8px;outline:none;-webkit-appearance:none;}
.rename-err{font-size:.78rem;color:#ff5555;margin-top:3px;display:none;}
.rename-err.show{display:block;}

/* WOOD INPUT */
.wood-inp{width:100%;font-size:16px;font-family:'Crimson Text',serif;background:rgba(0,0,0,.38);border:2px solid var(--ws);border-radius:4px;color:var(--wt);padding:9px 12px;outline:none;box-shadow:inset 0 2px 5px rgba(0,0,0,.4);margin-bottom:10px;-webkit-appearance:none;text-align:left;}
.wood-inp:focus{border-color:var(--w1);}
.wood-inp::placeholder{color:var(--pc);opacity:.6;}
input[type="date"].wood-inp{color:var(--wt);}
input[type="date"].wood-inp::-webkit-date-and-time-value{text-align:left;}
textarea.wood-inp{resize:none;}
.inp-label{font-family:'Cinzel',serif;font-size:.82rem;color:var(--wt);margin-bottom:5px;display:block;letter-spacing:.3px;}

/* SLIDE PANEL */
.sp{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s;}
.sp.open{background:rgba(0,0,0,.55);pointer-events:all;}
.sp-inner{width:100%;max-width:var(--max-w);background:repeating-linear-gradient(88deg,transparent 0,transparent 20px,rgba(0,0,0,.05) 20px,rgba(0,0,0,.05) 22px),linear-gradient(175deg,var(--w1) 0%,#7a3a10 30%,var(--w4) 100%);border-top:4px solid var(--ws);border-radius:18px 18px 0 0;padding:16px 16px calc(var(--safe-b) + 20px);overflow:hidden;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,1,.56,1);box-shadow:0 -10px 40px rgba(0,0,0,.6);will-change:transform;display:flex;flex-direction:column;}
.sp.open .sp-inner{transform:translateY(0);}
.sp-handle{width:44px;height:5px;background:rgba(255,255,255,.3);border-radius:3px;margin:0 auto 14px;flex-shrink:0;}
.sp-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--wt);text-shadow:1px 1px 2px var(--ws);margin-bottom:14px;text-align:center;letter-spacing:.8px;flex-shrink:0;}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-shrink:0;}
.btn-row-l{display:flex;gap:8px;justify-content:flex-start;margin-top:14px;flex-shrink:0;}

/* ADD GAME PANEL */
.sp-fixed{flex-shrink:0;}
.chips-row-wrap{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-shrink:0;}
.chips-label{font-family:'Cinzel',serif;font-size:.82rem;color:var(--wt);letter-spacing:.3px;white-space:nowrap;flex-shrink:0;}
.chips-scroll{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:2px;scrollbar-width:none;touch-action:pan-x;}
.chips-scroll::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#c8d420,#a0b000);border:1.5px solid #6a8000;border-radius:4px;padding:3px 6px 3px 8px;font-family:'Crimson Text',serif;font-size:.85rem;color:#1a1a00;font-weight:600;white-space:nowrap;flex-shrink:0;}
.chip-x{color:#cc0000;font-size:.9rem;font-weight:900;cursor:pointer;padding:1px 2px;user-select:none;-webkit-user-select:none;flex-shrink:0;}
.paste-wrap{position:relative;margin-bottom:9px;flex-shrink:0;}
.paste-wrap textarea{margin-bottom:0;}
.mech-sel-list{border:2px solid var(--ws);border-radius:4px;background:rgba(0,0,0,.28);overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:100px;touch-action:pan-y;}
.mech-sel-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);min-height:44px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.mech-sel-row:last-child{border-bottom:none;}
.mech-sel-chk{width:22px;height:22px;border-radius:3px;flex-shrink:0;border:2px solid var(--w2);background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;pointer-events:none;}
.mech-sel-chk.on{background:linear-gradient(135deg,#1a6a10,#2a9a20);border-color:#4ac830;}
.mech-sel-chk.on::after{content:'✓';color:#a0ff80;font-size:13px;}
.mech-sel-name{font-size:1rem;color:var(--wt);pointer-events:none;flex:1;}

/* DETAIL */
.detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0;}
.detail-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--wt);flex:1;}
.detail-scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.detail-sec{font-family:'Cinzel',serif;font-size:.82rem;color:#d4a060;letter-spacing:.5px;margin:12px 0 5px;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:3px;}
.detail-val{font-size:1rem;color:var(--wt);line-height:1.5;}
.detail-chip{display:inline-block;background:rgba(0,0,0,.28);border:1px solid rgba(255,200,80,.18);border-radius:3px;padding:4px 9px;font-size:.88rem;color:var(--wt);margin:3px 3px 3px 0;}
.empty{text-align:center;color:var(--pc);font-style:italic;font-size:.95rem;padding:12px 0;}
.err-msg{font-size:.82rem;color:#ff5555;margin-top:4px;display:none;}
.err-msg.show{display:block;}
</style>
</head>
<body>

<div id="loadScreen"><span>Loading...</span></div>
<div class="bg"></div>
<div class="rays"><div class="ray"></div><div class="ray"></div><div class="ray"></div><div class="ray"></div></div>
<div class="trunk"></div>
<div class="mushrooms">
  <svg width="120" height="150" viewBox="0 0 130 160" fill="none">
    <ellipse cx="55" cy="100" rx="18" ry="28" fill="#d4c8a0" stroke="#a09060" stroke-width="1.5"/>
    <ellipse cx="55" cy="100" rx="10" ry="26" fill="#e0d8b0"/>
    <path d="M10 105 Q20 55 55 50 Q90 55 100 105 Q78 118 55 115 Q32 118 10 105Z" fill="#d44010"/>
    <path d="M10 105 Q20 55 55 50 Q90 55 100 105 Q78 118 55 115 Q32 118 10 105Z" fill="none" stroke="#a03008" stroke-width="1.5"/>
    <ellipse cx="30" cy="80" rx="8" ry="5" fill="rgba(255,255,255,0.25)" transform="rotate(-20 30 80)"/>
    <ellipse cx="72" cy="68" rx="6" ry="4" fill="rgba(255,255,255,0.2)" transform="rotate(10 72 68)"/>
    <ellipse cx="90" cy="128" rx="10" ry="18" fill="#d4c8a0" stroke="#a09060" stroke-width="1"/>
    <path d="M68 130 Q75 100 90 96 Q105 100 112 130 Q102 138 90 136 Q78 138 68 130Z" fill="#e8b820"/>
    <path d="M68 130 Q75 100 90 96 Q105 100 112 130 Q102 138 90 136 Q78 138 68 130Z" fill="none" stroke="#c09010" stroke-width="1.2"/>
    <ellipse cx="22" cy="145" rx="7" ry="12" fill="#c8c0a0" stroke="#a09880" stroke-width="1"/>
    <path d="M8 147 Q12 128 22 125 Q32 128 36 147 Q30 152 22 151 Q14 152 8 147Z" fill="#b0a890"/>
  </svg>
</div>

<div class="app" id="app" style="display:none">
  <div class="inner" id="mainInner">
    <div class="exp-box" id="expBox">
      <div class="app-title">Designer's EXP</div>
      <span class="exp-label" id="expLabel"><span class="ew">EXP.</span> 0/0 [0.00%]</span>
      <div class="exp-bar-wrap" id="expWrap">
        <div class="exp-bar-inner">
          <div class="exp-fill" id="expFill" style="width:0%"></div>
          <div class="exp-empty"></div>
        </div>
        <canvas class="exp-ticks" id="expCanvas"></canvas>
      </div>
    </div>

    <!-- GAMES PLAYED -->
    <div class="panel games-panel" id="gamesPanel">
      <div class="panel-hdr">
        <span class="panel-title">Games Played</span>
        <div class="hdr-btns" id="gameHdrBtns"></div>
      </div>
      <div class="panel-body" id="gamesBody">
        <div id="gamesFilterRow"></div>
        <div class="games-list-scroll" id="gamesList"></div>
      </div>
    </div>

    <!-- MECHANICS -->
    <div class="panel mech-panel" id="mechPanel">
      <div class="panel-hdr">
        <span class="panel-title">Mechanics</span>
        <div class="hdr-btns" id="mechHdrBtns"></div>
      </div>
      <div class="panel-body">
        <input class="search-inp" id="mechSearch" placeholder="Search mechanics..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <div class="filter-row" id="mechFilterRow"></div>
        <div class="mech-scroll" id="mechList"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT GAME -->
<div class="sp" id="spGame">
  <div class="sp-inner" id="spGameInner">
    <div class="sp-handle"></div>
    <div class="sp-title" id="spGameTitle">Add Game</div>
    <div class="sp-fixed">
      <div style="margin-bottom:10px;">
        <label class="inp-label">Game Name</label>

const DB_NAME='dexp_db',DB_VER=1;
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('store'))d.createObjectStore('store');};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}
function dbGet(k){return new Promise((res,rej)=>{const tx=db.transaction('store','readonly');const req=tx.objectStore('store').get(k);req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e);});}
function dbSet(k,v){return new Promise((res,rej)=>{const tx=db.transaction('store','readwrite');const req=tx.objectStore('store').put(v,k);req.onsuccess=()=>res();req.onerror=e=>rej(e);});}

function openSP(id){document.getElementById(id).classList.add('open');}

function initSP(id){
  const panel=document.getElementById(id);
  const inner=panel.querySelector('.sp-inner');
  // Backdrop
  panel.addEventListener('click',e=>{if(e.target===panel)closeSP(id);});
  // Swipe — but not when touch starts inside scrollable areas
  let sy=0,cy=0,active=false,blocked=false;
  inner.addEventListener('touchstart',e=>{
    // Check if touch started inside a scrollable child
    const scrollables=inner.querySelectorAll('.mech-sel-list,.chips-scroll,.mech-scroll,.games-list-scroll,.detail-scroll');
    blocked=false;
    for(const el of scrollables){
      if(el.contains(e.target)){blocked=true;break;}
    }
    sy=e.touches[0].clientY;cy=sy;active=true;
  },{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!active||blocked)return;
    cy=e.touches[0].clientY;
    const dy=cy-sy;
    if(dy>0){inner.style.transition='none';inner.style.transform=`translateY(${dy}px)`;}
  },{passive:true});
  inner.addEventListener('touchend',()=>{
    active=false;
    if(blocked){blocked=false;return;}
    inner.style.transition='';
    if(cy-sy>inner.offsetHeight*.25){inner.style.transform='';closeSP(id);}
    else inner.style.transform='';
  });
}

// ── EXP ──
function updateExp(){
  const total=mechanics.length;
  const ticked=mechanics.filter(m=>isTicked(m)).length;
  const pct=total>0?(ticked/total*100):0;
  document.getElementById('expFill').style.width=pct+'%';
  document.getElementById('expLabel').innerHTML=`<span class="ew">EXP.</span> ${ticked}/${total} [${pct.toFixed(2)}%]`;
  drawTicks();
}
function drawTicks(){
  const canvas=document.getElementById('expCanvas');
  const wrap=document.getElementById('expWrap');
  const w=wrap.offsetWidth,h=wrap.offsetHeight;
  if(!w||!h)return;
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  for(let i=0;i<=40;i++){
    const x=Math.round(i/40*w);
    const maj=i%10===0,mid=i%5===0;
    const th=maj?h:mid?Math.round(h*.55):Math.round(h*.32);
    ctx.strokeStyle=maj?'rgba(0,0,0,0.5)':'rgba(0,0,0,0.28)';
    ctx.lineWidth=maj?1.5:0.8;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,th);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,h);ctx.lineTo(x,h-th);ctx.stroke();
  }
}

function saveGame(){

function renderChips(){

function removeChip(m){

  const ta=document.getElementById('mechPaste');

// ── PASTE/SEARCH ──
let lastCursorLine='';
function getCurrentLineFilter(){
  const ta=document.getElementById('mechPaste');
  const val=ta.value;
  const pos=ta.selectionStart||0;
  const lines=val.split('\n');
  let charCount=0;
  for(const line of lines){
    charCount+=line.length+1;
    if(charCount>pos)return line.trim().toLowerCase();
  }
  return lines[lines.length-1].trim().toLowerCase();
}

function onPasteInput(){
  const ta=document.getElementById('mechPaste');
  const val=ta.value;
  const lines=val.split('\n');
  const ml=mechanics.map(m=>m.toLowerCase());

  // Match all lines to mechanics and update selMechs
  const newSel=new Set();
  const newPasted=new Set();
  lines.forEach(line=>{
    const t=line.trim();if(!t)return;
    const idx=ml.indexOf(t.toLowerCase());
    if(idx!==-1){newSel.add(mechanics[idx]);newPasted.add(mechanics[idx].toLowerCase());}
  });
  // Keep manually selected mechs that aren't in paste field
  selMechs.forEach(m=>{if(!pastedLines.has(m.toLowerCase())&&!newPasted.has(m.toLowerCase()))newSel.add(m);});
  selMechs=newSel;
  pastedLines=newPasted;
  renderChips();

  // Filter list based on current cursor line
  const curFilter=getCurrentLineFilter();
  const list=document.getElementById('mechSelList');
  const st=list.scrollTop;
  renderMechSelList(curFilter);
  list.scrollTop=st;

  // Apply red text to completed lines (not current line)
  applyLineColours();
}

function applyLineColours(){
  // We use a div overlay approach — but since we removed the overlay, we instead style the textarea text
  // Instead: show line colours only on blur/Enter
  // We handle this in the keydown event
}

function onPasteKeydown(e){
  if(e.key==='Enter'){
    // After pressing Enter, colour the previous line if no match
    setTimeout(()=>{
      applyRedLines();
    },10);
  }
}

function applyRedLines(){
  // We cannot colour individual lines in a textarea natively
  // So we show a read-only styled display div below the textarea
  const ta=document.getElementById('mechPaste');
  const val=ta.value;
  const lines=val.split('\n');
  const ml=mechanics.map(m=>m.toLowerCase());
  // Get current line index
  const pos=ta.selectionStart||val.length;
  let charCount=0,curLineIdx=0;
  for(let i=0;i<lines.length;i++){
    charCount+=lines[i].length+1;
    if(charCount>pos){curLineIdx=i;break;}
    if(i===lines.length-1)curLineIdx=i;
  }
  // Build display
  let display=document.getElementById('pasteLineDisplay');
  if(!display){
    display=document.createElement('div');display.id='pasteLineDisplay';
    display.style.cssText='font-size:13px;margin-top:4px;flex-shrink:0;';
    ta.parentNode.insertBefore(display,ta.nextSibling);
  }
  const badLines=[];
  lines.forEach((line,i)=>{
    const t=line.trim();
    if(!t)return;
    if(i!==curLineIdx&&ml.indexOf(t.toLowerCase())===-1){
      badLines.push(esc(t));
    }
  });
  if(badLines.length){
    display.innerHTML='<span style="color:#ff5555;font-family:Crimson Text,serif;">Not found: '+badLines.join(', ')+'</span>';
  } else {
    display.innerHTML='';
  }
}

function renderMechSelList(filter){
  const list=document.getElementById('mechSelList');list.innerHTML='';
  const ml=mechanics.map(m=>m.toLowerCase());
  const pasted=mechanics.filter(m=>pastedLines.has(m.toLowerCase())&&(!filter||m.toLowerCase().includes(filter)));
  const rest=mechanics.filter(m=>!pastedLines.has(m.toLowerCase())&&(!filter||m.toLowerCase().includes(filter)));
  [...pasted,...rest].forEach(m=>{
    const row=document.createElement('div');row.className='mech-sel-row';
    row.innerHTML=`<div class="mech-sel-chk ${selMechs.has(m)?'on':''}"></div><span class="mech-sel-name">${esc(m)}</span>`;
    row.addEventListener('click',()=>{
      if(pastedLines.has(m.toLowerCase())){removeChip(m);return;}
      if(selMechs.has(m)){
        selMechs.delete(m);
        // Remove from paste field if present
        const ta=document.getElementById('mechPaste');
        const lines=ta.value.split('\n').filter(l=>l.trim().toLowerCase()!==m.toLowerCase());
        ta.value=lines.join('\n');
      } else {
        selMechs.add(m);
        // Add to paste field
        const ta=document.getElementById('mechPaste');
        const cur=ta.value;
        ta.value=cur?(cur+'\n'+m):m;
        pastedLines.add(m.toLowerCase());
      }
      renderChips();
      const st=list.scrollTop;
      renderMechSelList(getCurrentLineFilter());
      list.scrollTop=st;
      applyRedLines();
    });
    list.append(row);
  });
}

  const el=document.getElementById('mechList');el.innerHTML='';
  const search=document.getElementById('mechSearch').value.trim().toLowerCase();
  let list=mechanics.filter(m=>!search||m.toLowerCase().includes(search));
  if(mechFilter==='played')list=list.filter(m=>isTicked(m));
  else if(mechFilter==='notplayed')list=list.filter(m=>!isTicked(m));
  else if(mechFilter==='liked')list=list.filter(m=>getMeta(m).liked);

  if(editingMechanics){
    list.forEach(m=>{
      const idx=mechanics.indexOf(m);
      const isRen=renamingIdx===idx;
      const row=document.createElement('div');row.className='mech-edit-row';
      const chk=document.createElement('div');chk.className='mech-chk'+(isTicked(m)?' on':'');
      chk.addEventListener('click',()=>{
        const mt=getMeta(m);
        if(isTicked(m)){mt.manualUntick=true;mt.manualTick=false;}
        else{mt.manualTick=true;mt.manualUntick=false;}
        chk.className='mech-chk'+(isTicked(m)?' on':'');
        updateExp();
      });
      row.append(chk);
      if(isRen){
        const wrap=document.createElement('div');wrap.style.cssText='flex:1;min-width:0;display:flex;flex-direction:column;';
        const inp=document.createElement('input');inp.className='mech-edit-inp';inp.value=m;inp.id='renInp_'+idx;
        const errMsg=document.createElement('div');errMsg.className='rename-err';errMsg.textContent='Mechanic Already Exists';
        wrap.append(inp,errMsg);
        const doneBtn=mkBtn('Done','btn sm',()=>{
          const nv=inp.value.trim();
          if(!nv||mechExists(nv,idx))return;
          if(nv!==m){
            const old=mechanics[idx];mechanics[idx]=nv;
            if(meta[old]){meta[nv]=meta[old];delete meta[old];}
            games.forEach(g=>{const i=g.mechanics.indexOf(old);if(i!==-1)g.mechanics[i]=nv;});
          }
          renamingIdx=null;renderMechs();
        });
        const cancelBtn=mkBtn('Cancel','btn sm',()=>{renamingIdx=null;renderMechs();});
        inp.addEventListener('input',()=>{
          const nv=inp.value.trim();
          const exists=nv.length>0&&mechExists(nv,idx);
          errMsg.className='rename-err'+(exists?' show':'');
          doneBtn.disabled=exists||!nv;
        });
        // Focus directly — triggers keyboard on iOS within same gesture
        inp.addEventListener('click',()=>inp.focus());
        row.append(wrap,doneBtn,cancelBtn);
        inp.focus();
      } else {
        const nm=document.createElement('span');nm.className='mech-edit-name';nm.textContent=m;
        row.append(nm,
          mkBtn('Rename','btn sm blue',()=>{renamingIdx=idx;renderMechs();}),
          mkBtn('Delete','btn sm danger',()=>{
            if(!confirm('Delete "'+m+'"?'))return;
            mechanics.splice(idx,1);delete meta[m];
            games.forEach(g=>{g.mechanics=g.mechanics.filter(x=>x!==m);});
            renderMechs();updateExp();
          })
        );
      }
      el.append(row);
    });
  } else {
    const ticked=list.filter(m=>isTicked(m)).sort((a,b)=>a.localeCompare(b));
    const unticked=list.filter(m=>!isTicked(m)).sort((a,b)=>a.localeCompare(b));
    [...ticked,...unticked].forEach(m=>{
      const row=document.createElement('div');row.className='mech-row'+(isTicked(m)?' ticked':'');
      const nameWrap=document.createElement('span');nameWrap.className='mech-row-name';
      if(isTicked(m)){const t=document.createElement('span');t.className='tick-sym';t.textContent='✓';nameWrap.append(t);}
      nameWrap.append(document.createTextNode(m));
      const h=document.createElement('button');h.className='heart'+(getMeta(m).liked?' on':'');h.textContent=getMeta(m).liked?'♥':'♡';
      h.addEventListener('click',()=>{getMeta(m).liked=!getMeta(m).liked;saveAll();renderMechs();});
      row.append(nameWrap,h);el.append(row);
    });
    if(!ticked.length&&!unticked.length)el.innerHTML='<div class="empty">Nothing to show.</div>';
  }
}

// ── ADD MECHANIC ──
function openAddMech(){
  document.getElementById('newMechInp').value='';
  document.getElementById('addMechErr').className='err-msg';
  document.getElementById('btnAddMechSave').disabled=false;
  openSP('spAddMech');
}
function saveNewMech(){
  const val=document.getElementById('newMechInp').value.trim();
  if(!val||mechExists(val))return;
  const idx=mechanics.findIndex(m=>m.toLowerCase()>val.toLowerCase());
  if(idx===-1)mechanics.push(val);else mechanics.splice(idx,0,val);
  saveAll();renderMechs();updateExp();closeSP('spAddMech');
}
document.getElementById('newMechInp').addEventListener('input',()=>{
  const val=document.getElementById('newMechInp').value.trim();
  const exists=val.length>0&&mechExists(val);
  document.getElementById('addMechErr').className='err-msg'+(exists?' show':'');
  document.getElementById('btnAddMechSave').disabled=exists||!val;
});

// ── APP ICON ──
function generateIcon(){
  const size=180;
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,size);
  grad.addColorStop(0,'#1a1a0e');
  grad.addColorStop(0.65,'#1a1a0e');
  grad.addColorStop(1,'#4a4a4a');
  const r=24;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.arcTo(size,0,size,r,r);
  ctx.lineTo(size,size-r);ctx.arcTo(size,size,size-r,size,r);
  ctx.lineTo(r,size);ctx.arcTo(0,size,0,size-r,r);
  ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);
  ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='rgba(200,212,32,0.07)';ctx.lineWidth=1.5;
  for(let i=0;i<size;i+=12){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(size,i+6);ctx.stroke();}
  const fontSize=size*.65;
  ctx.font=`bold ${fontSize}px Cinzel,Georgia,serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText('D',size/2+2,size/2+3);
  ctx.fillStyle='#f0e8d0';
  ctx.shadowColor='rgba(200,212,32,0.5)';ctx.shadowBlur=12;
  ctx.fillText('D',size/2,size/2);ctx.shadowBlur=0;
  const link=document.createElement('link');link.rel='apple-touch-icon';link.href=c.toDataURL('image/png');
  document.head.appendChild(link);
}

function mkBtn(label,cls,fn){const b=document.createElement('button');b.className=cls;b.textContent=label;b.addEventListener('click',fn);return b;}

// ── WIRE BUTTONS ──
document.getElementById('btnGameCancel').addEventListener('click',()=>closeSP('spGame'));
document.getElementById('btnGameSave').addEventListener('click',saveGame);
document.getElementById('mechPaste').addEventListener('input',onPasteInput);
document.getElementById('mechPaste').addEventListener('keydown',onPasteKeydown);
document.getElementById('mechPaste').addEventListener('blur',applyRedLines);
document.getElementById('mechSearch').addEventListener('input',renderMechs);
document.getElementById('detailHeart').addEventListener('click',()=>{if(detailGameId!==null)toggleGameLike(detailGameId);});
document.getElementById('btnDetailBack').addEventListener('click',()=>closeSP('spDetail'));
document.getElementById('btnAddMechCancel').addEventListener('click',()=>closeSP('spAddMech'));
document.getElementById('btnAddMechSave').addEventListener('click',saveNewMech);

// ── INIT ──
async function init(){
  await openDB();
  const [sm,smeta,sg]=await Promise.all([dbGet('mechanics'),dbGet('meta'),dbGet('games')]);
  mechanics=sm||[...DEFAULT_MECHANICS];
  meta=smeta||{};
  games=sg||[];
  renderGamesHdr();renderGames();renderGamesFilter();
  renderMechHdr();renderMechFilter();renderMechs();
  updateExp();setPanelH();
  generateIcon();
  window.addEventListener('resize',()=>{drawTicks();setPanelH();});
  setTimeout(()=>{drawTicks();applyPanelLayout();},100);
  document.getElementById('app').style.display='flex';
  const ls=document.getElementById('loadScreen');
  ls.classList.add('hide');
  setTimeout(()=>ls.remove(),600);
}
init().catch(e=>{console.error(e);document.querySelector('#loadScreen span').textContent='Error loading. Please refresh.';});
</script>
