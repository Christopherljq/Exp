<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Designer's EXP"/>
<meta name="theme-color" content="#1a0a2e"/>
<title>Designer's EXP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
--wood-dark:#2a1005;--wood-mid:#5a2e0e;--wood-light:#8b4513;--wood-hi:#c47a3a;
--wood-text:#fff5e0;--wood-shadow:#1a0803;
--parch:#e8dcc0;--parch-dark:#c4b090;
--jewel-emerald:#0d4a2a;--jewel-sapphire:#0a1a4a;--jewel-amethyst:#2a0a4a;
--jewel-ruby:#4a0a0a;--jewel-gold:#c8a020;
--glow1:rgba(100,200,255,0.18);--glow2:rgba(180,120,255,0.15);--glow3:rgba(80,255,160,0.12);
--exp-fill-top:#e8f840;--exp-fill-bot:#8fa000;--exp-empty:#4a4a30;
--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}

html,body{height:100%;overflow:hidden;font-family:'Crimson Text',Georgia,serif;}

/* ── BACKGROUND ── */
.bg{
position:fixed;inset:0;z-index:0;
background:
radial-gradient(ellipse at 70% 0%,rgba(120,60,200,0.55) 0%,transparent 55%),
radial-gradient(ellipse at 20% 30%,rgba(30,160,100,0.45) 0%,transparent 50%),
radial-gradient(ellipse at 80% 60%,rgba(30,80,200,0.35) 0%,transparent 45%),
radial-gradient(ellipse at 40% 80%,rgba(180,40,80,0.25) 0%,transparent 40%),
radial-gradient(ellipse at 60% 40%,rgba(255,200,50,0.18) 0%,transparent 35%),
linear-gradient(160deg,#0a1a0e 0%,#0d1a2e 35%,#1a0a2e 65%,#0a1505 100%);
}

/* ── WATERCOLOUR WASH LAYER ── */
.bg-wash{
position:fixed;inset:0;z-index:1;pointer-events:none;
background:
radial-gradient(ellipse at 15% 85%,rgba(20,120,60,0.4) 0%,transparent 40%),
radial-gradient(ellipse at 85% 15%,rgba(160,60,20,0.35) 0%,transparent 35%),
radial-gradient(ellipse at 50% 50%,rgba(80,40,160,0.2) 0%,transparent 60%);
mix-blend-mode:screen;
filter:blur(18px);
}

/* ── LIGHT RAYS ── */
.light-rays{
position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;
}
.ray{
position:absolute;top:-10%;left:50%;
width:3px;height:130%;
background:linear-gradient(180deg,rgba(200,255,180,0.0) 0%,rgba(200,255,180,0.22) 30%,rgba(200,255,180,0.08) 70%,transparent 100%);
transform-origin:top center;
filter:blur(4px);
animation:rayPulse 6s ease-in-out infinite;
}
.ray:nth-child(1){left:20%;width:60px;transform:rotate(-12deg);animation-delay:0s;background:linear-gradient(180deg,transparent,rgba(180,220,255,0.2),transparent);}
.ray:nth-child(2){left:38%;width:40px;transform:rotate(-4deg);animation-delay:1.5s;background:linear-gradient(180deg,transparent,rgba(200,255,180,0.18),transparent);}
.ray:nth-child(3){left:55%;width:80px;transform:rotate(6deg);animation-delay:0.8s;background:linear-gradient(180deg,transparent,rgba(255,220,120,0.15),transparent);}
.ray:nth-child(4){left:72%;width:35px;transform:rotate(14deg);animation-delay:2.5s;background:linear-gradient(180deg,transparent,rgba(220,160,255,0.2),transparent);}
.ray:nth-child(5){left:85%;width:55px;transform:rotate(20deg);animation-delay:1s;background:linear-gradient(180deg,transparent,rgba(180,255,220,0.15),transparent);}
@keyframes rayPulse{0%,100%{opacity:0.6;}50%{opacity:1;}}

/* ── STAINED GLASS GEOMETRIC OVERLAY ── */
.stained-glass{
position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0.07;
background-image:
repeating-linear-gradient(60deg,rgba(100,200,255,1) 0,rgba(100,200,255,1) 1px,transparent 0,transparent 50%),
repeating-linear-gradient(120deg,rgba(180,100,255,1) 0,rgba(180,100,255,1) 1px,transparent 0,transparent 50%),
repeating-linear-gradient(0deg,rgba(80,220,140,1) 0,rgba(80,220,140,1) 1px,transparent 0,transparent 50%);
background-size:60px 104px,60px 104px,60px 104px;
}

/* ── FLOATING GEMS / PARTICLES ── */
.particles{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden;}
.particle{
position:absolute;border-radius:50%;
animation:floatUp linear infinite;
opacity:0;
}
@keyframes floatUp{
0%{transform:translateY(100vh) scale(0);opacity:0;}
10%{opacity:1;}
90%{opacity:0.6;}
100%{transform:translateY(-20vh) scale(1);opacity:0;}
}

/* ── BOOK BORDER ── */
.book-border{
position:fixed;inset:0;z-index:5;pointer-events:none;
}
.book-border::before{
content:'';position:absolute;inset:0;
border:22px solid var(--parch);
box-shadow:
inset 0 0 0 3px var(--parch-dark),
inset 0 0 20px rgba(0,0,0,0.4),
inset 20px 0 40px rgba(0,0,0,0.3),
0 0 0 1px rgba(0,0,0,0.5);
background:
linear-gradient(90deg,var(--parch-dark) 0px,var(--parch) 8px,transparent 22px,transparent calc(100% - 22px),var(--parch) calc(100% - 8px),var(--parch-dark) 100%),
linear-gradient(180deg,var(--parch-dark) 0px,var(--parch) 8px,transparent 22px,transparent calc(100% - 22px),var(--parch) calc(100% - 8px),var(--parch-dark) 100%);
}
/* Book spine left */
.book-spine{
position:absolute;left:0;top:0;bottom:0;width:32px;
background:linear-gradient(90deg,#8a6a30,#c4a060,#8a6a30,#b09050,#6a5020);
box-shadow:2px 0 8px rgba(0,0,0,0.5);
z-index:6;
}
.book-spine::after{
content:'';position:absolute;inset:4px 6px;
background:repeating-linear-gradient(180deg,rgba(255,255,255,0.1) 0,rgba(255,255,255,0.1) 2px,transparent 2px,transparent 18px);
}

/* ── MAIN APP ── */
.app{
position:fixed;inset:0;z-index:7;
padding:calc(var(--safe-top) + 24px) 18px calc(var(--safe-bot) + 24px) 48px;
overflow-y:auto;-webkit-overflow-scrolling:touch;
}

/* ── TITLE ── */
.app-title{
text-align:center;
font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;
letter-spacing:2px;
background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700,#fffacd);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
filter:drop-shadow(0 2px 8px rgba(255,180,0,0.5));
margin-bottom:14px;
text-shadow:none;
}

/* ── EXP BAR ── */
.exp-container{margin-bottom:16px;}
.exp-label-text{
font-family:monospace;font-size:11px;font-weight:bold;
color:#d4f060;
text-shadow:0 0 8px rgba(180,220,0,0.8),0 0 16px rgba(100,200,0,0.4);
margin-bottom:4px;letter-spacing:.5px;
padding:0 2px;
}
.exp-bar-wrap{
position:relative;height:20px;
background:var(--exp-empty);
border:2px solid #0a0a00;
border-radius:2px;overflow:hidden;
box-shadow:inset 0 2px 6px rgba(0,0,0,0.7),0 0 12px rgba(160,200,0,0.2);
}
.exp-bar-fill{
height:100%;
background:linear-gradient(180deg,var(--exp-fill-top) 0%,#b8c800 40%,var(--exp-fill-bot) 100%);
box-shadow:0 0 10px rgba(200,240,0,0.6);
transition:width .6s cubic-bezier(.4,0,.2,1);
}
.exp-ticks{position:absolute;inset:0;z-index:2;pointer-events:none;}

/* ── WOOD PANEL ── */
.wood-panel{
position:relative;margin-bottom:16px;border-radius:8px;
border:3px solid var(--wood-shadow);
background:
repeating-linear-gradient(88deg,transparent 0,transparent 22px,rgba(0,0,0,0.06) 22px,rgba(0,0,0,0.06) 24px),
linear-gradient(175deg,#c4844a 0%,#8b4513 20%,#5a2e0e 60%,#2a1005 100%);
box-shadow:
inset 0 1px 0 rgba(255,255,255,0.2),
inset 0 -2px 0 rgba(0,0,0,0.5),
0 6px 20px rgba(0,0,0,0.6),
0 0 30px rgba(100,60,0,0.3),
0 0 1px rgba(200,160,60,0.4);
overflow:hidden;
}
.wood-panel::before{
content:'';position:absolute;inset:0;pointer-events:none;
background:
radial-gradient(ellipse at 30% 20%,rgba(220,180,80,0.15) 0%,transparent 50%),
radial-gradient(ellipse at 70% 80%,rgba(100,40,0,0.3) 0%,transparent 50%);
}
.wood-panel::after{
content:'';position:absolute;inset:2px;border-radius:5px;pointer-events:none;
border-top:1px solid rgba(255,255,255,0.18);border-left:1px solid rgba(255,255,255,0.1);
}
.panel-header{
display:flex;align-items:center;justify-content:space-between;
padding:10px 14px 9px;
border-bottom:2px solid var(--wood-shadow);
box-shadow:0 2px 0 rgba(255,255,255,0.08);
position:relative;z-index:1;
}
.panel-title{
font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;
color:var(--wood-text);
text-shadow:1px 1px 3px var(--wood-shadow),0 0 8px rgba(255,180,60,0.3);
letter-spacing:.8px;
}
.panel-body{padding:10px 14px;position:relative;z-index:1;}

/* ── WOOD BUTTON ── */
.wood-btn{
background:linear-gradient(180deg,#d4904a 0%,#8b4513 50%,#4a2008 100%);
border:2px solid var(--wood-shadow);border-radius:5px;
color:var(--wood-text);font-family:'Cinzel',serif;
font-size:.78rem;font-weight:700;padding:5px 12px;cursor:pointer;
text-shadow:1px 1px 2px var(--wood-shadow);
box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),0 3px 6px rgba(0,0,0,0.4),0 0 8px rgba(160,80,0,0.2);
letter-spacing:.3px;white-space:nowrap;transition:all .15s;
}
.wood-btn:active{transform:translateY(1px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1),0 1px 2px rgba(0,0,0,0.4);}
.wood-btn.small{font-size:.7rem;padding:4px 9px;}
.wood-btn.danger{background:linear-gradient(180deg,#b03828 0%,#6b1f10 100%);border-color:#2a0800;}

/* ── GAME ROW ── */
.game-row{
display:flex;align-items:center;justify-content:space-between;
padding:9px 12px;margin-bottom:6px;cursor:pointer;
border-radius:5px;border:1px solid rgba(255,200,80,0.15);
background:rgba(0,0,0,0.25);
transition:background .15s;
}
.game-row:active{background:rgba(0,0,0,0.4);}
.game-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--wood-text);text-shadow:1px 1px 2px var(--wood-shadow);}
.game-date{font-size:.76rem;color:var(--parch-dark);margin-top:2px;}
.game-row-right{display:flex;align-items:center;gap:6px;}

/* ── MECHANIC ROW ── */
.mechanic-row{
display:flex;align-items:center;gap:10px;
padding:7px 12px;margin-bottom:5px;border-radius:4px;
border:1px solid rgba(255,200,80,0.08);background:rgba(0,0,0,0.2);
}
.mechanic-check{
width:20px;height:20px;border-radius:3px;flex-shrink:0;
border:2px solid var(--wood-light);background:rgba(0,0,0,0.35);
display:flex;align-items:center;justify-content:center;
}
.mechanic-check.ticked{background:linear-gradient(135deg,#1a6a10,#2a9a20);border-color:#4ac830;box-shadow:0 0 6px rgba(60,200,40,0.4);}
.mechanic-check.ticked::after{content:'✓';color:#a0ff80;font-size:13px;line-height:1;}
.mechanic-name{font-size:.88rem;color:var(--wood-text);flex:1;}
.mechanic-count{font-size:.74rem;color:#c8a060;}

/* ── FILTER ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}

/* ── INPUTS ── */
.wood-input{
width:100%;background:rgba(0,0,0,0.4);
border:2px solid var(--wood-shadow);border-radius:4px;
color:var(--wood-text);font-family:'Crimson Text',serif;
font-size:.95rem;padding:8px 10px;outline:none;
box-shadow:inset 0 2px 6px rgba(0,0,0,0.4);margin-bottom:10px;
}
.wood-input:focus{border-color:#c4844a;box-shadow:inset 0 2px 6px rgba(0,0,0,0.4),0 0 8px rgba(196,132,74,0.3);}
.wood-input::placeholder{color:var(--parch-dark);opacity:.6;}
textarea.wood-input{resize:vertical;min-height:60px;}
.input-label{font-family:'Cinzel',serif;font-size:.76rem;color:var(--parch-dark);margin-bottom:4px;display:block;letter-spacing:.3px;}

/* ── SLIDE PANEL ── */
.slide-panel{
position:fixed;inset:0;z-index:50;
display:flex;flex-direction:column;justify-content:flex-end;
background:rgba(0,0,0,0.6);
opacity:0;pointer-events:none;transition:opacity .3s;
}
.slide-panel.open{opacity:1;pointer-events:all;}
.slide-panel-inner{
background:
repeating-linear-gradient(88deg,transparent 0,transparent 22px,rgba(0,0,0,0.05) 22px,rgba(0,0,0,0.05) 24px),
linear-gradient(175deg,#c4844a 0%,#7a3a10 30%,#2a1005 100%);
border-top:4px solid var(--wood-shadow);
border-radius:18px 18px 0 0;
padding:18px 18px calc(var(--safe-bot) + 22px);
max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
transform:translateY(100%);
transition:transform .38s cubic-bezier(.32,1,.56,1);
box-shadow:0 -10px 40px rgba(0,0,0,0.6),0 0 60px rgba(100,40,0,0.3);
}
.slide-panel.open .slide-panel-inner{transform:translateY(0);}
.slide-panel-title{
font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;
color:var(--wood-text);text-shadow:1px 1px 3px var(--wood-shadow),0 0 10px rgba(255,180,60,0.3);
margin-bottom:14px;text-align:center;letter-spacing:1px;
}
.form-row{margin-bottom:12px;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;}
.btn-row-left{display:flex;gap:10px;justify-content:flex-start;margin-top:14px;}

/* ── MECHANIC SELECTOR ── */
.mechanic-select-list{
max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch;
border:2px solid var(--wood-shadow);border-radius:4px;background:rgba(0,0,0,0.3);
}
.mechanic-select-row{
display:flex;align-items:center;gap:8px;
padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;
}
.mechanic-select-row:last-child{border-bottom:none;}
.mechanic-select-row:active{background:rgba(255,255,255,0.07);}
.mechanic-select-check{
width:18px;height:18px;border-radius:3px;flex-shrink:0;
border:2px solid var(--wood-light);background:rgba(0,0,0,0.3);
display:flex;align-items:center;justify-content:center;
}
.mechanic-select-check.selected{background:linear-gradient(135deg,#1a6a10,#2a9a20);border-color:#4ac830;}
.mechanic-select-check.selected::after{content:'✓';color:#a0ff80;font-size:11px;}
.mechanic-select-name{font-size:.86rem;color:var(--wood-text);}

/* ── DETAIL ── */
.detail-section-title{
font-family:'Cinzel',serif;font-size:.8rem;color:#d4a060;
letter-spacing:.5px;margin:12px 0 5px;
border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:3px;
}
.detail-text{font-size:.9rem;color:var(--wood-text);line-height:1.5;}
.detail-mechanic-tag{
display:inline-block;background:rgba(0,0,0,0.3);
border:1px solid rgba(255,200,80,0.2);border-radius:3px;
padding:3px 8px;font-size:.78rem;color:var(--wood-text);margin:3px 3px 3px 0;
}

.empty-state{text-align:center;color:var(--parch-dark);font-style:italic;font-size:.86rem;padding:12px 0;}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-wash"></div>
<div class="light-rays">
<div class="ray"></div><div class="ray"></div><div class="ray"></div>
<div class="ray"></div><div class="ray"></div>
</div>
<div class="stained-glass"></div>
<div class="particles" id="particles"></div>
<div class="book-border"></div>
<div class="book-spine"></div>

<div class="app" id="app">

<div class="app-title">Designer's EXP</div>

<!-- EXP BAR -->
<div class="exp-container">
<div class="exp-label-text" id="expLabel">EXP. 0/0 [0.00%]</div>
<div class="exp-bar-wrap">
<div class="exp-bar-fill" id="expFill" style="width:0%"></div>
<canvas class="exp-ticks" id="expTicks"></canvas>
<!-- ADD/EDIT GAME PANEL -->
<div class="slide-panel" id="addGamePanel">
<div class="slide-panel-inner">
<div class="slide-panel-title" id="addGameTitle">Add Game</div>
<div class="form-row">
<label class="input-label">Game Name</label>
<input class="wood-input" id="gameNameInput" type="text" placeholder="Enter game name"/>
</div>
<div class="form-row">
<label class="input-label">Date Played</label>
<input class="wood-input" id="gameDateInput" type="date"/>
</div>
<div class="form-row">
<label class="input-label">Mechanics</label>
<textarea class="wood-input" id="mechanicsSearch" placeholder="Search or paste list (one per line)..." rows="2" oninput="onMechanicsSearch()"></textarea>
<div class="mechanic-select-list" id="mechanicsSelectList"></div>
</div>
<div class="btn-row">
<button class="wood-btn" onclick="closeAddGame()">Cancel</button>
<button class="wood-btn" onclick="saveGame()">Save</button>
</div>
</div>
</div>

<!-- GAME DETAIL PANEL -->
<div class="slide-panel" id="gameDetailPanel">
<div class="slide-panel-inner">
<div class="slide-panel-title" id="detailTitle"></div>
<div class="detail-section-title">Date Played</div>
<div class="detail-text" id="detailDate"></div>
<div class="detail-section-title">Mechanics</div>
<div id="detailMechanics"></div>
<div class="btn-row-left">
<button class="wood-btn" onclick="closeDetailPanel()">Back</button>
</div>
</div>
</div>

<!-- EDIT LIST PANEL -->
<div class="slide-panel" id="editListPanel">
<div class="slide-panel-inner">
<div class="slide-panel-title">Edit Mechanics List</div>
<div style="display:flex;gap:8px;margin-bottom:10px;">
<input class="wood-input" id="newMechanicInput" type="text" placeholder="New mechanic name..." style="margin-bottom:0;flex:1"/>
<button class="wood-btn" onclick="addMechanic()">Add</button>
</div>
<div id="editMechanicsList"></div>
<div class="btn-row-left">
<button class="wood-btn" onclick="closeEditList()">Back</button>
</div>
</div>
</div>

<script>
const DEFAULT_MECHANICS=[
let mechanics=JSON.parse(localStorage.getItem('dexp_mechanics')||'null')||[...DEFAULT_MECHANICS];
let games=JSON.parse(localStorage.getItem('dexp_games')||'[]');
let mechanicsFilter='all';
let editingGames=false;
let editingGameId=null;
let selectedMechanicsInForm=new Set();

function save(){
localStorage.setItem('dexp_mechanics',JSON.stringify(mechanics));
localStorage.setItem('dexp_games',JSON.stringify(games));
}

// ── PARTICLES ──
function spawnParticles(){
const el=document.getElementById('particles');
const colours=['rgba(100,200,255,0.7)','rgba(180,100,255,0.7)','rgba(80,255,160,0.7)',
'rgba(255,200,60,0.7)','rgba(255,100,120,0.7)','rgba(60,220,255,0.7)'];
for(let i=0;i<18;i++){
const p=document.createElement('div');
p.className='particle';
const size=Math.random()*5+2;
p.style.cssText=`
left:${Math.random()*100}%;
width:${size}px;height:${size}px;
background:${colours[Math.floor(Math.random()*colours.length)]};
animation-duration:${8+Math.random()*12}s;
animation-delay:${Math.random()*10}s;
box-shadow:0 0 ${size*2}px ${colours[Math.floor(Math.random()*colours.length)]};
`;
el.appendChild(p);
}
}

// ── EXP ──
function getUniqueTickedCount(){
const t=new Set();
games.forEach(g=>g.mechanics.forEach(m=>t.add(m)));
return t.size;
}
function updateExp(){
const total=mechanics.length;
const ticked=getUniqueTickedCount();
const pct=total>0?(ticked/total*100):0;
document.getElementById('expFill').style.width=pct+'%';
document.getElementById('expLabel').textContent='EXP. '+ticked+'/'+total+' ['+pct.toFixed(2)+'%]';
drawTicks();
}
function drawTicks(){
const canvas=document.getElementById('expTicks');
const wrap=canvas.parentElement;
const w=wrap.offsetWidth,h=wrap.offsetHeight;
canvas.width=w;canvas.height=h;
const ctx=canvas.getContext('2d');
ctx.clearRect(0,0,w,h);
const n=40;
for(let i=0;i<=n;i++){
const x=Math.round(i/n*w);
const maj=i%10===0,mid=i%5===0;
const th=maj?h:mid?Math.round(h*.55):Math.round(h*.32);
ctx.strokeStyle=maj?'rgba(0,0,0,0.6)':'rgba(0,0,0,0.35)';
ctx.lineWidth=maj?1.5:1;
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,th);ctx.stroke();
ctx.beginPath();ctx.moveTo(x,h);ctx.lineTo(x,h-th);ctx.stroke();
}
}

// ── GAMES ──
function renderGames(){
const el=document.getElementById('gamesList');
if(!games.length){el.innerHTML='<div class="empty-state">No games recorded yet.</div>';return;}
el.innerHTML=games.map((g,i)=>`
<div class="game-row" onclick="${editingGames?'':('openGameDetail('+i+')')}">
<div>
<div class="game-name">${esc(g.name)}</div>
<div class="game-date">${formatDate(g.date)}</div>
</div>
<div class="game-row-right">
${editingGames?`
<button class="wood-btn small" onclick="event.stopPropagation();openEditGame(${i})">Edit</button>
<button class="wood-btn small danger" onclick="event.stopPropagation();deleteGame(${i})">Delete</button>
`:''}
</div>
</div>`).join('');
}
function toggleEditGames(){
editingGames=!editingGames;
document.getElementById('editGamesBtn').textContent=editingGames?'Done':'Edit';
renderGames();
}
function deleteGame(i){
if(confirm('Delete "'+games[i].name+'"?')){
games.splice(i,1);save();renderGames();renderMechanics();updateExp();
}
}

// ── ADD/EDIT GAME ──
function openAddGame(){
editingGameId=null;
document.getElementById('addGameTitle').textContent='Add Game';
document.getElementById('gameNameInput').value='';
document.getElementById('gameDateInput').value=todayStr();
document.getElementById('mechanicsSearch').value='';
selectedMechanicsInForm=new Set();
renderMechanicsSelect('');
document.getElementById('addGamePanel').classList.add('open');
}
function openEditGame(i){
editingGameId=i;
const g=games[i];
document.getElementById('addGameTitle').textContent='Edit Game';
document.getElementById('gameNameInput').value=g.name;
document.getElementById('gameDateInput').value=g.date;
document.getElementById('mechanicsSearch').value='';
selectedMechanicsInForm=new Set(g.mechanics);
renderMechanicsSelect('');
document.getElementById('addGamePanel').classList.add('open');
}
function closeAddGame(){document.getElementById('addGamePanel').classList.remove('open');}
function saveGame(){
const name=document.getElementById('gameNameInput').value.trim();
if(!name){alert('Please enter a game name.');return;}
const date=document.getElementById('gameDateInput').value;
const mArr=Array.from(selectedMechanicsInForm);
const obj={name,date,mechanics:mArr};
if(editingGameId!==null)games[editingGameId]=obj;
else games.push(obj);
save();renderGames();renderMechanics();updateExp();closeAddGame();
}

// ── GAME DETAIL ──
function openGameDetail(i){
const g=games[i];
document.getElementById('detailTitle').textContent=g.name;
document.getElementById('detailDate').textContent=formatDate(g.date)||'—';
const mEl=document.getElementById('detailMechanics');
mEl.innerHTML=g.mechanics.length
?g.mechanics.map(m=>`<span class="detail-mechanic-tag">${esc(m)}</span>`).join('')
:'<span style="color:var(--parch-dark);font-style:italic;font-size:.86rem">None recorded</span>';
document.getElementById('gameDetailPanel').classList.add('open');
}
function closeDetailPanel(){document.getElementById('gameDetailPanel').classList.remove('open');}

// ── MECHANICS FORM SELECT ──
function onMechanicsSearch(){
const val=document.getElementById('mechanicsSearch').value;
const lines=val.split('\n').map(l=>l.trim().toLowerCase()).filter(Boolean);
if(lines.length>1){
mechanics.forEach(m=>{
if(lines.some(l=>m.toLowerCase().includes(l)||l.includes(m.toLowerCase())))
selectedMechanicsInForm.add(m);
});
}
renderMechanicsSelect(lines.length===1?lines[0]:'');
}
function renderMechanicsSelect(filter){
const list=document.getElementById('mechanicsSelectList');
const filtered=filter?mechanics.filter(m=>m.toLowerCase().includes(filter)):mechanics;
list.innerHTML=filtered.map(m=>`
<div class="mechanic-select-row" onclick="toggleFormMechanic('${esc(m).replace(/'/g,"\\'")}')">
<div class="mechanic-select-check ${selectedMechanicsInForm.has(m)?'selected':''}"></div>
<span class="mechanic-select-name">${esc(m)}</span>
</div>`).join('');
}
function toggleFormMechanic(name){
if(selectedMechanicsInForm.has(name))selectedMechanicsInForm.delete(name);
else selectedMechanicsInForm.add(name);
const filter=document.getElementById('mechanicsSearch').value.split('\n')[0].trim().toLowerCase();
renderMechanicsSelect(filter);
}

// ── MECHANICS MAIN ──
function renderMechanics(){
const el=document.getElementById('mechanicsList');
const ticked=new Set();
games.forEach(g=>g.mechanics.forEach(m=>ticked.add(m)));
const counts={};
games.forEach(g=>g.mechanics.forEach(m=>{counts[m]=(counts[m]||0)+1;}));
let list=mechanics;
if(mechanicsFilter==='ticked')list=mechanics.filter(m=>ticked.has(m));
if(mechanicsFilter==='unticked')list=mechanics.filter(m=>!ticked.has(m));
el.innerHTML=list.map(m=>`
<div class="mechanic-row">
<div class="mechanic-check ${ticked.has(m)?'ticked':''}"></div>
<span class="mechanic-name">${esc(m)}</span>
${counts[m]?`<span class="mechanic-count">${counts[m]}x</span>`:''}
</div>`).join('')||'<div class="empty-state">Nothing to show.</div>';
['All','Ticked','Unticked'].forEach(f=>{
const btn=document.getElementById('filter'+f);
const active=mechanicsFilter===f.toLowerCase();
btn.style.background=active?'linear-gradient(180deg,#e0a050 0%,#8b4513 100%)':'';
btn.style.boxShadow=active?'0 0 10px rgba(220,140,40,0.5)':'';
});
}
function setFilter(f){mechanicsFilter=f;renderMechanics();}

// ── EDIT LIST ──
function openEditList(){renderEditMechanics();document.getElementById('editListPanel').classList.add('open');}
function closeEditList(){document.getElementById('editListPanel').classList.remove('open');renderMechanics();updateExp();}
function renderEditMechanics(){
const el=document.getElementById('editMechanicsList');
el.innerHTML=mechanics.map((m,i)=>`
<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
<input class="wood-input" style="margin-bottom:0;flex:1;padding:5px 8px;font-size:.85rem"
value="${esc(m)}" onchange="renameMechanic(${i},this.value)"/>
<button class="wood-btn small danger" onclick="deleteMechanic(${i})">Delete</button>
</div>`).join('');
}
function addMechanic(){
const val=document.getElementById('newMechanicInput').value.trim();
if(!val)return;
mechanics.push(val);
document.getElementById('newMechanicInput').value='';
save();renderEditMechanics();
}
function renameMechanic(i,val){
const old=mechanics[i];mechanics[i]=val.trim();
games.forEach(g=>{const idx=g.mechanics.indexOf(old);if(idx!==-1)g.mechanics[idx]=mechanics[i];});
save();
}
function deleteMechanic(i){
const name=mechanics[i];
if(confirm('Delete "'+name+'"?')){
mechanics.splice(i,1);
games.forEach(g=>{g.mechanics=g.mechanics.filter(m=>m!==name);});
save();renderEditMechanics();
}
}

// ── UTILS ──
function todayStr(){return new Date().toISOString().split('T')[0];}
function formatDate(str){
if(!str)return'';
return new Date(str+'T00:00:00').toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
}
function esc(str){
return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──
spawnParticles();
renderGames();
renderMechanics();
updateExp();
window.addEventListener('resize',drawTicks);
</script>
</body>
</html>
